<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Админка</title>
</head>
<body>

<h2>Статистика</h2>

<div>Продажа: <span id="sale"></span></div>
<div>Аренда: <span id="rent"></span></div>
<div>Покупка: <span id="buy"></span></div>

<script>
async function loadStats(){
    const res = await fetch("get_stats.php");
    const data = await res.json();

    sale.textContent = data.sale;
    rent.textContent = data.rent;
    buy.textContent = data.buy_request;
}

loadStats();
setInterval(loadStats, 3000);
</script>

</body>
</html>
